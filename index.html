      function renderList(items) {
        if (!items || items.length === 0)
          return '<div class="flex flex-col items-center justify-center h-full py-12 text-gray-400"><svg class="w-12 h-12 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg><span class="text-sm font-medium">Nenhum requisito definido</span></div>';

        let html = '<div class="space-y-1">';
        items.forEach(item => {
          let text = item.text;
          let indent = item.indent || 0;
          if (text.includes('\n')) {
            text.split('\n').forEach(line => {
              let cleanLine = line.trim();
              if (!cleanLine) return;

              if (cleanLine.startsWith('□ ')) {
                cleanLine = cleanLine.substring(2);
                html += `
                  <div class="flex items-start gap-3 py-2 border-b border-gray-100 last:border-0 group">
                    <div class="mt-0.5 text-brand-500 opacity-70 group-hover:opacity-100 transition-opacity">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="3" rx="2" stroke-width="2"></rect></svg>
                    </div>
                    <span class="text-gray-700 font-medium">${cleanLine}</span>
                  </div>`;
              } else {
                html += `<div class="indent-1 py-1.5 border-b border-gray-100 last:border-0">${cleanLine}</div>`;
              }
            });
          } else {
            html += `<div class="indent-${Math.min(indent, 4)}">${text}</div>`;
          }
        });
        html += '</div>';
        return html;
      }

      function showCategory(category) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.className =
            'px-5 py-2.5 rounded-lg text-sm font-medium transition-all text-gray-500 hover:text-gray-900 hover:bg-white/50 tab-btn';
        });
        const activeBtn = document.getElementById('btn-' + category);
        if (activeBtn) {
          activeBtn.className =
            'px-5 py-2.5 rounded-lg text-sm font-semibold transition-all bg-white text-brand-600 shadow-sm ring-1 ring-gray-900/5 tab-btn';
        }

        const catData = data[category];
        const levels = [
          {
            id: 'JR',
            title: 'Júnior',
            bgHeader: 'bg-emerald-50',
            borderHeader: 'border-emerald-100',
            textTitle: 'text-emerald-800',
          },
          {
            id: 'PL',
            title: 'Pleno',
            bgHeader: 'bg-blue-50',
            borderHeader: 'border-blue-100',
            textTitle: 'text-blue-800',
          },
          {
            id: 'SR',
            title: 'Sênior',
            bgHeader: 'bg-purple-50',
            borderHeader: 'border-purple-100',
            textTitle: 'text-purple-800',
          },
        ];

        let html = '<div class="grid grid-cols-1 md:grid-cols-3 gap-8">';

        levels.forEach(level => {
          const hasContent = catData[level.id] && catData[level.id].length > 0;

          html += `
                    <div class="level-card rounded-2xl overflow-hidden flex flex-col h-[calc(100vh-14rem)] bg-white">
                        <div class="px-6 py-5 border-b ${level.borderHeader} flex flex-col justify-center items-center gap-1 ${level.bgHeader}">
                            <span class="text-xs font-semibold tracking-wider text-gray-500 uppercase">Nível</span>
                            <h2 class="text-2xl font-bold tracking-tight ${level.textTitle}">
                                ${level.title}
                            </h2>
                        </div>
                        <div class="p-6 flex-grow overflow-y-auto custom-scrollbar ${!hasContent ? 'flex items-center justify-center bg-gray-50/50' : ''}">
                            ${renderList(catData[level.id])}
                        </div>
                    </div>
                `;
        });

        html += '</div>';
        document.getElementById('content-container').innerHTML = html;
      }

      document.addEventListener('DOMContentLoaded', () => {
        showCategory('Técnico Trilha II');
      });
    </script>
  </body>
</html>
